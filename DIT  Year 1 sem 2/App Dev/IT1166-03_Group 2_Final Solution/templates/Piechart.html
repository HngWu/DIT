<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pie Chart with Flask</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <canvas id="myPieChart" width="400" height="400"></canvas>
    <script>
        var ctx = document.getElementById('myPieChart').getContext('2d');
        var myPieChart = new Chart(ctx, {
            type: 'pie',
            data: {
                labels: {{ plabels | tojson }},
                datasets: [{
                    data: {{ pvalues | tojson }},
                    backgroundColor: [
                        'rgba(255,  99,  132,  0.2)',
                        'rgba(54,  162,  235,  0.2)',
                        'rgba(255,  206,  86,  0.2)',
                        'rgba(75,  192,  192,  0.2)'
                    ],
                    borderColor: [
                        'rgba(255,  99,  132,  1)',
                        'rgba(54,  162,  235,  1)',
                        'rgba(255,  206,  86,  1)',
                        'rgba(75,  192,  192,  1)'
                    ],
                    borderWidth:  1
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false
            }
        });
    </script>
</body>
</html>
